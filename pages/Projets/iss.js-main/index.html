<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Position en temps réel de la Station spatiale internationale (ISS) sur une carte."
    />
    <title>ISS — position en direct</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      :root {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: #0f172a;
        background: #f1f5f9;
      }
      body {
        margin: 0;
        padding: 1rem min(1.25rem, 4vw) 2rem;
        max-width: 960px;
        margin-inline: auto;
      }
      h1 {
        font-size: clamp(1.35rem, 3vw, 1.75rem);
        margin: 0 0 0.5rem;
      }
      .lead {
        color: #64748b;
        margin: 0 0 1rem;
        font-size: 0.95rem;
      }
      .stats {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 1rem 1.15rem;
        margin-bottom: 1rem;
        display: grid;
        gap: 0.35rem;
        font-size: 0.92rem;
      }
      .stats strong {
        color: #334155;
        min-width: 7rem;
        display: inline-block;
      }
      .status {
        font-size: 0.82rem;
        color: #64748b;
        margin-bottom: 0.75rem;
      }
      .status--error {
        color: #b91c1c;
      }
      #issMap {
        height: min(55vh, 420px);
        width: 100%;
        border-radius: 12px;
        border: 1px solid #e2e8f0;
        z-index: 0;
      }
      .hint {
        font-size: 0.8rem;
        color: #94a3b8;
        margin-top: 0.75rem;
      }
    </style>
  </head>
  <body>
    <h1>Où est l’ISS ?</h1>
    <p class="lead">
      Données fournies par l’API
      <a href="https://wheretheiss.at/" target="_blank" rel="noopener noreferrer">Where The ISS At?</a>
      — position mise à jour automatiquement.
    </p>

    <p id="status" class="status" aria-live="polite">Chargement…</p>

    <div class="stats" aria-label="Coordonnées actuelles">
      <div><strong>Latitude</strong> <span id="lat">—</span>°</div>
      <div><strong>Longitude</strong> <span id="lon">—</span>°</div>
      <div><strong>Altitude</strong> <span id="alt">—</span></div>
      <div><strong>Vitesse</strong> <span id="speed">—</span></div>
      <div><strong>Mise à jour</strong> <span id="updated">—</span></div>
    </div>

    <div id="issMap" role="application" aria-label="Carte OpenStreetMap avec la position de l’ISS"></div>
    <p class="hint">
      La carte suit la station ; le marqueur rouge indique la position au sol (subsatellite).
    </p>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="index.js" defer></script>
  </body>
</html>
