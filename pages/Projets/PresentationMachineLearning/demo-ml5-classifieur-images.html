<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classificateur d’images — MobileNet · ML5</title>
    <link rel="stylesheet" href="../../../assets/vendor/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="../../../assets/css/Projets/cssMachineLearning/demo-ml5-classifieur-app.css">
  <link rel="stylesheet" href="../../../assets/css/fonts-offline.css" />
  <!-- fin polices hors ligne -->
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="app-logo">
                <div class="app-logo-icon" aria-hidden="true"><i class="fas fa-brain"></i></div>
                <div>
                    <h1 class="app-title">Classificateur MobileNet</h1>
                    <p class="app-subtitle">ML5.js · TensorFlow.js · Top 5 en français</p>
                </div>
            </div>
        </header>

        <div id="statusMessage" class="status-message loading">Chargement…</div>

        <div class="main-grid">
            <div class="card-ml">
                <div class="card-header-ml"><i class="fas fa-cloud-upload-alt"></i> Image</div>
                <div class="card-body-ml">
                    <div id="dropZone" class="drop-zone" role="button" tabindex="0">
                        <div class="drop-zone-icon"><i class="fas fa-image"></i></div>
                        <p class="drop-zone-text">Glissez-déposez une image ici, ou <strong>choisissez un fichier</strong></p>
                    </div>
                    <input type="file" id="fileInput" class="input-file" accept="image/*">
                    <div class="source-buttons">
                        <button type="button" id="btnUpload" class="btn-ml primary"><i class="fas fa-folder-open"></i> Parcourir</button>
                        <button type="button" id="btnWebcam" class="btn-ml"><i class="fas fa-camera"></i> Webcam</button>
                        <button type="button" id="btnReset" class="btn-ml"><i class="fas fa-undo"></i> Réinitialiser</button>
                    </div>
                    <div id="previewContainer" class="image-preview-container" style="display: none;">
                        <img id="imagePreview" class="image-preview" alt="Aperçu">
                    </div>
                </div>
            </div>

            <div class="card-ml">
                <div class="card-header-ml"><i class="fas fa-chart-bar"></i> Résultats</div>
                <div class="card-body-ml">
                    <div id="resultsContainer" class="results-section" style="display: none;">
                        <div id="statsRow" class="stats-row" style="display: none;">
                            <div class="stat-badge"><i class="fas fa-bolt"></i> Inférence : <span id="inferenceTime">—</span></div>
                        </div>
                        <div id="resultsList"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="samples-section">
            <h3 class="samples-title">Images d’exemple (cliquer pour tester)</h3>
            <div id="samplesGrid" class="samples-grid"></div>
        </div>
    </div>

    <div id="webcamModal" class="webcam-modal" role="dialog" aria-modal="true" aria-label="Webcam">
        <div class="webcam-modal-inner">
            <div class="webcam-container">
                <video id="webcamVideo" autoplay playsinline muted></video>
                <div class="webcam-overlay">
                    <button type="button" id="btnCapture" class="btn-ml primary">Capturer</button>
                    <button type="button" id="btnCloseWebcam" class="btn-ml">Fermer</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../../../assets/vendor/ml5/ml5.min.js" defer></script>
    <script src="../../../assets/js/Projets/jsMachineLearning/demo-ml5-classifieur.js" defer></script>
</body>
</html>
