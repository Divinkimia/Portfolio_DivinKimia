<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Divin Kimia &#8212; Entr&eacute;e th&egrave;me clair</title>
  <script src="assets/js/light-theme-init.js"></script>
  <style>
    :root {
      --bg: #f4f1ea;
      --ink: #1b1f26;
      --muted: #5f6774;
      --accent: #156c65;
      --line: rgba(28, 33, 40, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "IBM Plex Sans", system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(ellipse 70% 50% at 50% 0%, rgba(21, 108, 101, 0.08), transparent 55%),
        var(--bg);
    }
    .gate {
      width: min(90vw, 400px);
      text-align: center;
      padding: 2rem;
      background: rgba(255, 252, 247, 0.85);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: 0 16px 48px rgba(27, 31, 38, 0.08);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
    }
    .gate__logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 1rem;
      border-radius: 50%;
      overflow: hidden;
      border: 1px solid var(--line);
    }
    .gate__logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .gate p {
      margin: 0 0 1rem;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .gate__bar {
      height: 6px;
      border-radius: 999px;
      background: rgba(27, 31, 38, 0.08);
      overflow: hidden;
    }
    .gate__bar > span {
      display: block;
      width: 38%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), #0b6e7c);
      animation: gate-slide 1.1s ease-in-out infinite;
    }
    .gate__links {
      margin-top: 1.25rem;
      font-size: 0.88rem;
    }
    .gate__links a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 0.2em;
    }
    @keyframes gate-slide {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(280%); }
    }
    @media (prefers-reduced-motion: reduce) {
      .gate__bar > span { animation: none; transform: none; width: 70%; }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500&amp;display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/fonts-offline.css" />
  <script>
    (function () {
      var target = "pages/Accueil-light.html";
      var minDelay = 900;
      window.addEventListener("load", function () {
        setTimeout(function () {
          try { location.replace(target); } catch (e) { location.href = target; }
        }, minDelay);
      });
    })();
  </script>
</head>
<body>
  <main class="gate" aria-live="polite" aria-label="Chargement du portfolio, th&egrave;me clair">
    <div class="gate__logo">
      <img src="assets/img/ProfileAccueil.jpeg" alt="Divin Kimia" width="72" height="72" decoding="async" fetchpriority="high" />
    </div>
    <p>Chargement du portfolio (th&egrave;me clair)&#8230;</p>
    <div class="gate__bar"><span></span></div>
    <p class="gate__links">
      Si rien ne se passe, <a href="pages/Accueil-light.html">ouvrir l&apos;accueil clair</a>
      &middot; <a href="pages/Accueil.html">version sombre</a>
    </p>
  </main>
</body>
</html>
