<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400" role="img" aria-labelledby="issui-title issui-desc">
  <title id="issui-title">ISS au-dessus de la Terre</title>
  <desc id="issui-desc">Illustration station spatiale, orbite et planete stylisee.</desc>
  <defs>
    <linearGradient id="issui-sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="45%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <radialGradient id="issui-earth" cx="35%" cy="65%" r="55%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="60%" stop-color="#0369a1"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </radialGradient>
    <filter id="issui-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="640" height="400" rx="24" fill="url(#issui-sky)"/>
  <circle cx="220" cy="260" r="120" fill="url(#issui-earth)" opacity="0.95"/>
  <ellipse cx="220" cy="260" rx="180" ry="52" fill="none" stroke="rgba(167,139,250,0.35)" stroke-width="2" stroke-dasharray="8 12" transform="rotate(-18 220 260)"/>
  <ellipse cx="220" cy="260" rx="220" ry="64" fill="none" stroke="rgba(34,211,238,0.25)" stroke-width="1.5" transform="rotate(-18 220 260)"/>
  <g transform="translate(420 120)" filter="url(#issui-glow)">
    <rect x="-22" y="-14" width="44" height="28" rx="6" fill="rgba(148,163,184,0.35)" stroke="rgba(167,139,250,0.6)" stroke-width="1.5"/>
    <rect x="-8" y="-22" width="16" height="10" rx="2" fill="#22d3ee"/>
    <rect x="-8" y="14" width="16" height="10" rx="2" fill="#22d3ee"/>
    <text x="0" y="6" text-anchor="middle" fill="#e0e7ff" font-family="system-ui,sans-serif" font-size="11" font-weight="700">ISS</text>
  </g>
  <circle cx="420" cy="120" r="5" fill="#fbbf24" opacity="0.9"/>
  <text x="48" y="52" fill="#c4b5fd" font-family="system-ui,sans-serif" font-size="14" font-weight="600" letter-spacing="0.08em">WHERE THE ISS AT - LEAFLET</text>
  <text x="48" y="78" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="12">OpenStreetMap - JavaScript</text>
</svg>
